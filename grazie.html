<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thanks &mdash; ParkItBari</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050816;
      --bg-soft: #0b1020;
      --primary: #35d399;
      --text-main: #f9fafb;
      --text-muted: #9ca3af;
      --border-subtle: #1f2933;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text-main);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      text-align: center;
    }
    .card {
      background: var(--bg-soft);
      border: 1px solid var(--border-subtle);
      border-radius: 20px;
      padding: 48px 36px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    }
    .tick {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: rgba(53, 211, 153, 0.12);
      border: 1px solid rgba(53, 211, 153, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      color: var(--primary);
    }
    h1 {
      font-size: 28px;
      line-height: 1.25;
      margin: 0 0 14px;
      font-weight: 700;
    }
    h1 .emph { color: var(--primary); }
    p {
      color: var(--text-muted);
      font-size: 16px;
      line-height: 1.6;
      margin: 0 0 12px;
    }
    .it { font-size: 15px; }
    .actions {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .btn-primary {
      display: inline-block;
      background: var(--primary);
      color: #04231a;
      font-weight: 700;
      text-decoration: none;
      padding: 15px 28px;
      border-radius: 999px;
      font-size: 16px;
    }
    .btn-secondary {
      display: inline-block;
      color: var(--text-muted);
      text-decoration: none;
      padding: 12px;
      font-size: 15px;
      border-radius: 999px;
      border: 1px solid var(--border-subtle);
    }
    .divider {
      height: 1px;
      background: var(--border-subtle);
      margin: 22px 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="tick">&#10003;</div>

    <h1>
      You&rsquo;re <span class="emph">in</span>.
    </h1>
    <p>
      Thanks for joining the ParkItBari beta. We&rsquo;ll email you when we launch
      in your part of Bari.
    </p>

    <div class="divider"></div>

    <h1 style="font-size:22px;">
      Ci <span class="emph">sei</span>.
    </h1>
    <p class="it">
      Grazie per esserti iscritto alla beta di ParkItBari. Ti scriviamo appena
      partiamo nella tua zona di Bari.
    </p>

    <div class="actions">
      <a class="btn-primary" href="https://parkitbari-app.netlify.app" target="_blank" rel="noopener">
        Open the map now &middot; Apri la mappa &rarr;
      </a>
      <a class="btn-secondary" href="/">
        Back to the site &middot; Torna al sito
      </a>
    </div>
  </div>
</body>
</html>
